<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pose Battle Mobile</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#000;color:#fff;touch-action:manipulation}
.app{display:flex;flex-direction:column;height:100dvh}
/* Camera */
.cam{flex:1;position:relative;background:#000;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%}
/* Drop lane — thin bar on right */
.drop-lane{position:absolute;top:0;right:0;width:22vw;max-width:100px;height:100%;pointer-events:none;z-index:5}
.drop-lane .danger{position:absolute;bottom:0;width:100%;height:15%;background:rgba(244,67,54,0.1);border-top:2px dashed rgba(244,67,54,0.5)}
.drop-block{position:absolute;left:8%;width:84%;border-radius:6px;z-index:6;background:rgba(0,0,0,0.5);border:1.5px solid #00d4ff}
.drop-block canvas{width:100%;display:block;border-radius:6px 6px 0 0}
.drop-block .lbl{text-align:center;font-size:9px;color:#00d4ff;padding:2px;background:rgba(0,0,0,0.8);border-radius:0 0 6px 6px}
.drop-block.hit{animation:pop .35s ease-out forwards}
@keyframes pop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.7}100%{transform:scale(0);opacity:0}}
/* HUD */
.hud{position:absolute;top:0;left:0;right:22vw;display:flex;padding:1.5vh 4vw;gap:3vw;pointer-events:none;z-index:10}
.hud .item{flex:1;background:rgba(0,0,0,0.7);border-radius:10px;padding:1vh 0;text-align:center}
.hud .val{font-size:5vw;font-weight:900}
.hud .lbl{font-size:2.5vw;color:#aaa}
.hud .sc .val{color:#FFC107}
.hud .tm .val{color:#00d4ff}
.hud .lv .val{color:#e94560}
/* Message toast */
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8vw;font-weight:900;pointer-events:none;z-index:15;text-align:center;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.toast .big{font-size:14vw;display:block}
/* Overlay screens */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:50;padding:5vw;text-align:center}
.screen.show{display:flex}
.screen .emoji{font-size:15vw}
.screen h2{font-size:7vw;margin:2vh 0;color:#fff}
.screen p{font-size:4vw;color:#aaa;margin-bottom:3vh;line-height:1.4}
.screen .big-btn{width:70vw;max-width:300px;padding:2.5vh;border:none;border-radius:14px;font-size:5vw;font-weight:900;cursor:pointer;margin:1vh 0}
.big-btn.go{background:#FF9800;color:#fff}
.big-btn.retry{background:#e94560;color:#fff}
.big-btn.create{background:#00d4ff;color:#000}
/* Pose selector bar */
.pose-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);padding:1.5vh 3vw;z-index:8}
.pose-bar .title{font-size:2.8vw;color:#666;margin-bottom:1vh}
.pose-scroll{display:flex;gap:2vw;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:1vh}
.pose-chip{flex-shrink:0;padding:1.2vh 4vw;border-radius:20px;font-size:3.5vw;font-weight:700;border:2px solid #333;background:rgba(255,255,255,0.05);color:#ccc;cursor:pointer;transition:.2s;white-space:nowrap}
.pose-chip:active{background:rgba(0,212,255,0.15);border-color:#00d4ff}
.pose-chip .p-icon{font-size:6vw;margin-right:1vw;vertical-align:middle}
/* Record mode bar */
.rec-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);padding:1.5vh 3vw;z-index:8;display:none}
.rec-bar.show{display:block}
.rec-bar .btn-row{display:flex;gap:2vw}
.rec-bar .r-btn{flex:1;padding:1.8vh;border:none;border-radius:12px;font-size:4vw;font-weight:700;cursor:pointer}
.r-btn.capture{background:#e94560;color:#fff}
.r-btn.done{background:#4CAF50;color:#fff}
/* Countdown */
.cd{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:30}
.cd.show{display:flex}
.cd .num{font-size:25vw;font-weight:900;color:#fff;text-shadow:0 0 40px #e94560}
.cd .txt{font-size:4vw;color:#ccc;margin-top:2vh}
/* Name input */
.name-popup{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:55}
.name-popup.show{display:flex}
.name-popup input{width:70vw;padding:2vh 4vw;border-radius:10px;border:2px solid #e94560;background:#111;color:#fff;font-size:5vw;text-align:center;margin-bottom:2vh}
.name-popup button{width:50vw;padding:2vh;border-radius:10px;border:none;background:#e94560;color:#fff;font-size:5vw;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="app">
<div class="cam" id="camArea">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="drop-lane" id="dropLane"><div class="danger"></div></div>

<div class="hud" id="hud" style="display:none">
<div class="item sc"><div class="val" id="hudScore">0</div><div class="lbl">分數</div></div>
<div class="item tm"><div class="val" id="hudTimer">0s</div><div class="lbl">時間</div></div>
<div class="item lv"><div class="val" id="hudLives">❤️❤️❤️</div><div class="lbl">生命</div></div>
</div>

<div class="toast" id="toast"><span class="big" id="toastBig"></span><span id="toastMsg"></span></div>

<!-- Countdown -->
<div class="cd" id="cdOverlay"><div class="num" id="cdNum"></div><div class="txt" id="cdTxt"></div></div>

<!-- Screens -->
<div class="screen" id="startScreen">
<div class="emoji">🎯</div>
<h2>Pose Battle!</h2>
<p>跟住跌落嚟嘅動作<br>愈快做到分數愈高！</p>
<button class="big-btn go" onclick="startGame()">▶ 開始遊戲</button>
<button class="big-btn create" onclick="showRecordMode()">📸 錄新動作</button>
</div>

<div class="screen" id="gameOverScreen">
<div class="emoji" id="goEmoji">🏆</div>
<h2 id="goTitle">完!</h2>
<p id="goStats"></p>
<button class="big-btn retry" onclick="restartGame()">🔄 再嚟一次</button>
<button class="big-btn create" onclick="showRecordMode()">📸 錄新動作</button>
</div>

<!-- Name popup -->
<div class="name-popup" id="namePopup">
<input id="nameInput" placeholder="改名 (e.g. 大字, 舉手)" maxlength="12">
<button onclick="confirmRecord()">✅ 錄低!</button>
</div>

<!-- Pose bar (bottom) -->
<div class="pose-bar" id="poseBar">
<div class="title">📋 你嘅動作</div>
<div class="pose-scroll" id="poseScroll"></div>
</div>

<!-- Record bar -->
<div class="rec-bar" id="recBar">
<div class="btn-row">
<button class="r-btn capture" onclick="startRecord()">📸 錄動作</button>
<button class="r-btn done" onclick="hideRecordMode()">✅ 完成</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script>
let poses=[],currentLM=null,recording=false;
let gameOn=false,gameScore=0,gameLives=3,gameTime=0,gameTimer=null;
let dropBlocks=[],dropInterval=null,dropSpeed=1,gameLevel=1;
let toastTimer=null;

const ICONS='🧍🙆🙋🧘🤸💪🕺🏋️🤾🏃🦸'.split('');
const LNAMES=['nose','left_eye_inner','left_eye','left_eye_outer','right_eye_inner','right_eye','right_eye_outer','left_ear','right_ear','mouth_left','mouth_right','left_shoulder','right_shoulder','left_elbow','right_elbow','left_wrist','right_wrist','left_pinky','right_pinky','left_index','right_index','left_thumb','right_thumb','left_hip','right_hip','left_knee','right_knee','left_ankle','right_ankle','left_heel','right_heel','left_foot_index','right_foot_index'];
const JW={nose:.2,left_eye_inner:0,left_eye:0,left_eye_outer:0,right_eye_inner:0,right_eye:0,right_eye_outer:0,left_ear:0,right_ear:0,mouth_left:0,mouth_right:0,left_shoulder:1,right_shoulder:1,left_elbow:2,right_elbow:2,left_wrist:3,right_wrist:3,left_pinky:2,right_pinky:2,left_index:2,right_index:2,left_thumb:2,right_thumb:2,left_hip:1,right_hip:1,left_knee:2,right_knee:2,left_ankle:3,right_ankle:3,left_heel:2,right_heel:2,left_foot_index:2,right_foot_index:2};
const CONN=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],[27,29],[27,31],[28,30],[28,32],[0,1],[1,2],[2,3],[0,4],[4,5],[5,6],[9,10]];

function $id(id){return document.getElementById(id)}
function toast(big,msg,dur=1500){const t=$id('toast');$id('toastBig').textContent=big;$id('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),dur)}

// ── PERSISTENCE ──
function savePoses(){try{localStorage.setItem('poseBattle_poses',JSON.stringify(poses))}catch(e){}}
function loadPoses(){try{const d=localStorage.getItem('poseBattle_poses');if(d){poses=JSON.parse(d);renderPoses();return true}}catch(e){}return false}
const op=poses.push.bind(poses);poses.push=function(...a){const r=op(...a);savePoses();return r};
const os=poses.splice.bind(poses);poses.splice=function(...a){const r=os(...a);savePoses();return r};

// ── MEDIAPIPE ──
const pose=new Pose({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
pose.setOptions({modelComplexity:1,smoothLandmarks:true,enableSegmentation:false,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
pose.onResults(r=>{
  if(!r.poseLandmarks){currentLM=null;return}
  currentLM=r.poseLandmarks;
  const cv=$id('canvas'),ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
  drawSkel(ctx,r.poseLandmarks,cv.width,cv.height);
  if(!recording&&gameOn)checkMatch();
});

async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:480},height:{ideal:640},facingMode:'user'},audio:false});
    const v=$id('video');v.srcObject=s;await v.play();
    v.addEventListener('loadedmetadata',()=>{$id('canvas').width=v.videoWidth;$id('canvas').height=v.videoHeight});
    new Camera(v,{onFrame:async()=>{await pose.send({image:v})},width:480,height:640}).start();
  }catch(e){alert('Camera error: '+e.message)}
}

function drawSkel(ctx,lm,w,h){
  ctx.strokeStyle='rgba(0,212,255,0.8)';ctx.lineWidth=1.5;
  for(const[a,b]of CONN){ctx.beginPath();ctx.moveTo(lm[a].x*w,lm[a].y*h);ctx.lineTo(lm[b].x*w,lm[b].y*h);ctx.stroke()}
  for(let i=0;i<lm.length;i++){const wgt=JW[LNAMES[i]]||0;ctx.beginPath();ctx.arc(lm[i].x*w,lm[i].y*h,wgt>=2?5:2.5,0,Math.PI*2);ctx.fillStyle=wgt>=2?'#e94560':'#00d4ff';ctx.fill()}
}

// ── STICK THUMBNAIL ──
function drawStick(canvas,lm){
  const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);
  if(!lm)return;let mnX=1,mxX=0,mnY=1,mxY=0;
  for(const l of lm){mnX=Math.min(mnX,l.x);mxX=Math.max(mxX,l.x);mnY=Math.min(mnY,l.y);mxY=Math.max(mxY,l.y)}
  const pd=4,iw=w-pd*2,ih=h-pd*2,sx=iw/((mxX-mnX)||.5),sy=ih/((mxY-mnY)||.5),sc=Math.min(sx,sy);
  const ox=pd+(iw-(mxX-mnX)*sc)/2,oy=pd+(ih-(mxY-mnY)*sc)/2;
  const sl=lm.map(l=>({x:(l.x-mnX)*sc+ox,y:(l.y-mnY)*sc+oy}));
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.2;
  for(const[a,b]of CONN){ctx.beginPath();ctx.moveTo(sl[a].x,sl[a].y);ctx.lineTo(sl[b].x,sl[b].y);ctx.stroke()}
  for(let i=0;i<sl.length;i++){ctx.beginPath();ctx.arc(sl[i].x,sl[i].y,(JW[LNAMES[i]]||0)>=2?2.5:1.5,0,Math.PI*2);ctx.fillStyle='#00d4ff';ctx.fill()}
}

// ── RECORD ──
function showRecordMode(){$id('recBar').classList.add('show');$id('startScreen').classList.remove('show');$id('gameOverScreen').classList.remove('show');stopGame();renderPoses()}
function hideRecordMode(){$id('recBar').classList.remove('show');renderPoses()}
function startRecord(){
  if(recording||!currentLM)return;
  if(poses.length>=12){toast('⚠️','最多12個動作');return}
  $id('namePopup').classList.add('show');$id('nameInput').value='';$id('nameInput').focus();
}
function confirmRecord(){
  const name=$id('nameInput').value.trim()||'Pose '+(poses.length+1);
  $id('namePopup').classList.remove('show');
  runCountdown(`Hold "${name}"`,()=>{
    poses.push({name,icon:ICONS[poses.length%ICONS.length],landmarks:JSON.parse(JSON.stringify(currentLM))});
    toast('📸','Saved!');renderPoses();
  });
}
function runCountdown(msg,cb){
  recording=true;const ov=$id('cdOverlay'),num=$id('cdNum'),txt=$id('cdTxt');
  ov.classList.add('show');txt.textContent=msg;let c=3;
  function tick(){if(c>0){num.textContent=c;c--;setTimeout(tick,700)}else{num.textContent='GO!';num.style.color='#4CAF50';setTimeout(()=>{num.style.color='#fff';ov.classList.remove('show');cb();recording=false},500)}}
  tick();
}

// ── GAME ──
function startGame(){
  if(poses.length<2){toast('⚠️','錄至少2個動作先!');return}
  $id('startScreen').classList.remove('show');$id('poseBar').style.display='none';$id('recBar').classList.remove('show');
  gameScore=0;gameLives=3;gameTime=0;gameLevel=1;dropSpeed=1;dropBlocks=[];gameOn=true;
  $id('hud').style.display='flex';updateHUD();
  $id('dropLane').querySelectorAll('.drop-block').forEach(b=>b.remove());
  spawnDrop();dropInterval=setInterval(spawnDrop,2000);
  gameTimer=setInterval(()=>{gameTime++;updateHUD();if(gameTime%15===0){gameLevel++;dropSpeed+=.2;clearInterval(dropInterval);dropInterval=setInterval(spawnDrop,Math.max(700,2000-gameTime*18))}},1000);
  toast('🎮','GO!');
}
function stopGame(){gameOn=false;clearInterval(dropInterval);clearInterval(gameTimer);$id('hud').style.display='none';$id('poseBar').style.display='block'}
function restartGame(){stopGame();startGame();}
function updateHUD(){$id('hudScore').textContent=gameScore;$id('hudTimer').textContent=gameTime+'s';$id('hudLives').textContent='❤️'.repeat(Math.max(0,gameLives))+'🖤'.repeat(Math.max(0,3-gameLives))}

function spawnDrop(){
  if(!gameOn||poses.length===0)return;
  const idx=Math.floor(Math.random()*poses.length);
  const p=poses[idx],lane=$id('dropLane'),lw=lane.clientWidth;
  const bw=Math.round(lw*.84),bh=Math.round(bw*.9);
  const block=document.createElement('div');block.className='drop-block';
  block.style.width=bw+'px';block.style.top='-'+bh+'px';
  block.style.left=Math.round((lw-bw)/2)+'px';
  const cv=document.createElement('canvas');cv.width=bw;cv.height=Math.round(bh*.75);
  drawStick(cv,p.landmarks);block.appendChild(cv);
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=p.name;block.appendChild(lbl);
  lane.appendChild(block);
  dropBlocks.push({el:block,idx,y:-bh,speed:dropSpeed+Math.random()*.4});
}

function checkMatch(){
  if(!currentLM||!gameOn)return;
  for(const db of dropBlocks){
    const s=compare(currentLM,poses[db.idx].landmarks);
    if(Math.round(s*100)>=75){
      db.el.classList.add('hit');gameScore+=Math.round(s*100)+Math.round(dropSpeed*10);
      updateHUD();toast('🔥',`+${Math.round(s*100)}`,800);
      const el=db.el;setTimeout(()=>el.remove(),350);
      dropBlocks=dropBlocks.filter(b=>b!==db);return;
    }
  }
}

function gameOver(isWin){
  stopGame();
  $id('gameOverScreen').classList.add('show');
  $id('goEmoji').textContent=isWin?'🏆':'💀';
  $id('goTitle').textContent=isWin?'勁!':'完!';
  $id('goStats').textContent=`分數: ${gameScore} ｜ 時間: ${gameTime}s ｜ Level ${gameLevel}`;
  $id('dropLane').querySelectorAll('.drop-block').forEach(b=>b.remove());
  dropBlocks=[];
}

// ── DROP ANIMATION ──
function animDrops(){
  if(!gameOn){requestAnimationFrame(animDrops);return}
  const lh=$id('dropLane').clientHeight,danger=lh*.85;
  for(let i=dropBlocks.length-1;i>=0;i--){
    const db=dropBlocks[i];db.y+=db.speed;db.el.style.top=db.y+'px';
    if(db.y+60>danger){db.el.remove();dropBlocks.splice(i,1);gameLives--;updateHUD();if(gameLives<=0){gameOver(false);return}}
    if(db.y>lh+100){db.el.remove();dropBlocks.splice(i,1)}
  }
  requestAnimationFrame(animDrops);
}
animDrops();

// ── SIMILARITY ──
function normalize(lm){
  const lh=lm[23],rh=lm[24],ls=lm[11],rs=lm[12];if(!lh||!rh||!ls||!rs)return null;
  const cx=(lh.x+rh.x)/2,cy=(lh.y+rh.y)/2,scale=Math.sqrt((ls.x-rs.x)**2+(ls.y-rs.y)**2)||1;
  return lm.map(l=>({x:(l.x-cx)/scale,y:(l.y-cy)/scale,v:l.visibility||0}));
}
function compare(l1,l2){
  const n1=normalize(l1),n2=normalize(l2);if(!n1||!n2)return 0;
  let tw=0,wd=0;
  for(let i=0;i<n1.length;i++){const w=JW[LNAMES[i]]||0;if(w===0)continue;const v=Math.min(n1[i].v,n2[i].v);if(v<.5)continue;wd+=w*Math.sqrt((n1[i].x-n2[i].x)**2+(n1[i].y-n2[i].y)**2);tw+=w}
  return tw===0?0:Math.max(0,1-wd/tw/.5);
}

// ── DEMO POSES ──
function addDemos(){
  const tp=[];for(let i=0;i<33;i++)tp.push({x:.5,y:.5,z:0,visibility:1});
  tp[0]={x:.50,y:.15,z:0,visibility:1};tp[7]={x:.43,y:.20,z:0,visibility:1};tp[8]={x:.57,y:.20,z:0,visibility:1};
  tp[11]={x:.35,y:.32,z:0,visibility:1};tp[12]={x:.65,y:.32,z:0,visibility:1};
  tp[13]={x:.18,y:.32,z:0,visibility:1};tp[14]={x:.82,y:.32,z:0,visibility:1};
  tp[15]={x:.08,y:.32,z:0,visibility:1};tp[16]={x:.92,y:.32,z:0,visibility:1};
  tp[23]={x:.42,y:.55,z:0,visibility:1};tp[24]={x:.58,y:.55,z:0,visibility:1};
  tp[25]={x:.42,y:.75,z:0,visibility:1};tp[26]={x:.58,y:.75,z:0,visibility:1};
  tp[27]={x:.42,y:.92,z:0,visibility:1};tp[28]={x:.58,y:.92,z:0,visibility:1};
  const hu=JSON.parse(JSON.stringify(tp));
  hu[13]={x:.30,y:.10,z:0,visibility:1};hu[14]={x:.70,y:.10,z:0,visibility:1};hu[15]={x:.25,y:.02,z:0,visibility:1};hu[16]={x:.75,y:.02,z:0,visibility:1};
  const lh=JSON.parse(JSON.stringify(tp));
  lh[13]={x:.30,y:.10,z:0,visibility:1};lh[15]={x:.25,y:.02,z:0,visibility:1};lh[14]={x:.82,y:.32,z:0,visibility:1};lh[16]={x:.92,y:.32,z:0,visibility:1};
  poses.push({name:'T-Pose',icon:'🧍',landmarks:tp},{name:'HandsUp',icon:'🙆',landmarks:hu},{name:'LeftUp',icon:'🙋',landmarks:lh});
  savePoses();renderPoses();toast('✅','Added 3 demos');
}

// ── POSE UI ──
function delPose(i){poses.splice(i,1);renderPoses()}
function renderPoses(){
  const s=$id('poseScroll');
  if(poses.length===0){s.innerHTML='<span style="color:#555;font-size:3.5vw;padding:1vh">尚未錄動作 — 撳 📸 錄動作</span>';return}
  s.innerHTML=poses.map((p,i)=>`<div class="pose-chip"><span class="p-icon">${p.icon}</span>${p.name}<span style="color:#666;font-size:2.5vw;margin-left:2vw" onclick="event.stopPropagation();delPose(${i})">✕</span></div>`).join('');
}

// ── INIT ──
startCam();
if(!loadPoses()){addDemos()}
renderPoses();
if(poses.length>0)$id('startScreen').classList.add('show');
</script>
</body>
</html>
